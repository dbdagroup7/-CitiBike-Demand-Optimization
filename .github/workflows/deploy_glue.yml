name: Deploy Glue Scripts to S3

on:
  push:
    branches:
      - Develop
  workflow_dispatch:

jobs:
  deploy-glue-scripts:
    name: Upload Glue Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: eu-north-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Validate glue_scripts folder
        run: |
          if [ ! -d "glue_scripts" ]; then
            echo "❌ glue_scripts folder not found in repo"
            exit 1
          fi

      - name: Sync Glue scripts to S3
        run: |
          aws s3 sync glue_scripts/ \
            s3://ci-cd-testing-citibike-7/glue_scripts/ \
            --delete