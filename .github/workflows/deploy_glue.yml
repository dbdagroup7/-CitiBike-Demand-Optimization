name: Deploy Glue Scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  validate:
    name: Validate Python Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          echo " Validating Python scripts..."
          for file in glue_jobs/*.py; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python -m py_compile "$file"
            fi
          done
          echo " All scripts validated!"

  deploy:
    name: Deploy Glue Scripts
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev, test, prod]
    environment: ${{ matrix.env }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test AWS connection
        run: |
          echo " Testing AWS credentials..."
          aws sts get-caller-identity
          echo " AWS connection successful!"

      - name: Upload Glue scripts to versioned path
        run: |
          echo "======================================"
          echo " Deploying to ${{ matrix.env }} Environment"
          echo "======================================"
          echo "Bucket: s3://${{ vars.S3_BUCKET }}/glue_scripts/${{ github.sha }}/"
          echo "======================================"

          aws s3 sync glue_jobs/ s3://${{ vars.S3_BUCKET }}/glue_scripts/${{ github.sha }}/ \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.md"

          echo ""
          echo " Upload complete!"

      - name: Update latest pointer
        run: |
          aws s3 sync s3://${{ vars.S3_BUCKET }}/glue_scripts/${{ github.sha }}/ \
            s3://${{ vars.S3_BUCKET }}/glue_scripts/latest/ \
            --delete

      - name: Verify upload
        run: |
          echo ""
          echo " Files now in S3:"
          aws s3 ls s3://${{ vars.S3_BUCKET }}/glue_scripts/latest/ --recursive --human-readable
          echo ""

      - name: Deployment summary
        run: |
          echo "======================================"
          echo " Deployment Summary"
          echo "======================================"
          echo "Environment: ${{ matrix.env }}"
          echo "Bucket: ${{ vars.S3_BUCKET }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "======================================"
          echo " SUCCESS!"
