name: Deploy Glue Scripts

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'eu-north-1' }}

jobs:
  validate:
    name: Validate Python Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Python syntax
        run: |
          echo "Validating Python scripts..."
          for file in glue_jobs/*.py; do
            if [ -f "$file" ]; then
              echo "Checking $file"
              python -m py_compile "$file"
            fi
          done
          echo "All scripts validated!"

  deploy:
    name: Deploy Glue Scripts
    needs: validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env: [dev, test, prod]

    environment: ${{ matrix.env }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve S3 bucket
        shell: bash
        run: |
          if [ -n "${{ secrets.S3_BUCKET }}" ]; then
            echo "S3_BUCKET=${{ secrets.S3_BUCKET }}" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -n "${{ vars.S3_BUCKET }}" ]; then
            echo "S3_BUCKET=${{ vars.S3_BUCKET }}" >> "$GITHUB_ENV"
            exit 0
          fi
          S3_BUCKET=$(awk -F'"' '/^s3_bucket_name[[:space:]]*=/ {print $2}' "terraform/env/${{ matrix.env }}.tfvars")
          if [ -z "$S3_BUCKET" ]; then
            echo "S3 bucket is not set. Define secrets.S3_BUCKET or vars.S3_BUCKET, or add s3_bucket_name in terraform/env/${{ matrix.env }}.tfvars."
            exit 1
          fi
          echo "S3_BUCKET=$S3_BUCKET" >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS access
        run: aws sts get-caller-identity

      - name: Upload Glue scripts (versioned)
        run: |
          echo "Deploying to: ${{ matrix.env }}"
          aws s3 sync glue_jobs/ \
            s3://${{ env.S3_BUCKET }}/glue_scripts/${{ github.sha }}/ \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.md"

      - name: Update latest pointer
        run: |
          aws s3 sync \
            s3://${{ env.S3_BUCKET }}/glue_scripts/${{ github.sha }}/ \
            s3://${{ env.S3_BUCKET }}/glue_scripts/latest/ \
            --delete

      - name: Verify deployment
        run: |
          aws s3 ls \
            s3://${{ env.S3_BUCKET }}/glue_scripts/latest/ \
            --recursive --human-readable

      - name: Deployment summary
        run: |
          echo "Deployment successful"
          echo "Environment : ${{ matrix.env }}"
          echo "Bucket      : ${{ env.S3_BUCKET }}"
          echo "Branch      : ${{ github.ref_name }}"
          echo "Commit      : ${{ github.sha }}"
