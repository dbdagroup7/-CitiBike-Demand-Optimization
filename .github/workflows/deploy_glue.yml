name: Deploy Glue Scripts

on:
  push:
    branches:
      - Develop
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  S3_BUCKET_TEST: ci-cd-testing-citibike-7  # ← Your existing test bucket

jobs:
  validate:
    name: Validate Python Scripts
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Python syntax
        run: |
          echo "🔍 Validating Python scripts..."
          for file in glue_jobs/*.py; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              python -m py_compile "$file"
            fi
          done
          echo "✅ All scripts validated!"

  deploy-test:
    name: Deploy to Test Bucket
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Test AWS connection
        run: |
          echo "🔐 Testing AWS credentials..."
          echo "Current IAM user:"
          aws sts get-caller-identity
          echo ""
          echo "✅ AWS connection successful!"

      - name: Upload Glue scripts to S3
        run: |
          echo "======================================"
          echo "📤 Deploying to TEST Environment"
          echo "======================================"
          echo "Bucket: s3://${{ env.S3_BUCKET_TEST }}/glue_scripts/"
          echo "User: CI/CD User"
          echo "======================================"
          
          aws s3 sync glue_jobs/ s3://${{ env.S3_BUCKET_TEST }}/glue_scripts/ \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.md"
          
          echo ""
          echo "✅ Upload complete!"

      - name: Verify upload
        run: |
          echo ""
          echo "📋 Files now in S3:"
          aws s3 ls s3://${{ env.S3_BUCKET_TEST }}/glue_scripts/ --recursive --human-readable
          echo ""

      - name: Deployment summary
        run: |
          echo "======================================"
          echo "🎯 Deployment Summary"
          echo "======================================"
          echo "Environment: TEST"
          echo "Bucket: ${{ env.S3_BUCKET_TEST }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "======================================"
          echo "✅ SUCCESS!"
