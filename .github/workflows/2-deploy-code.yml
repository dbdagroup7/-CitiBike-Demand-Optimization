name: 2 - Deploy Code to AWS

on:
  push:
    branches:
      - Develop
    paths:
      - 'glue_jobs/**'
      - 'lambda/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  deploy-glue:
    name: 📤 Deploy Glue Scripts
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS (CI/CD User)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ✅ Validate Python scripts
        run: |
          echo "🔍 Validating Glue scripts..."
          for file in glue_jobs/*.py; do
            if [ -f "$file" ]; then
              echo "Checking: $file"
              python -m py_compile "$file"
            fi
          done
          echo "✅ All scripts valid!"

      - name: 📤 Upload to S3
        run: |
          # Get bucket name from Terraform output (or hardcode)
          BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
          
          echo "📤 Uploading Glue scripts to S3..."
          aws s3 sync glue_jobs/ s3://$BUCKET_NAME/glue_scripts/ \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude "*.md"
          
          echo "✅ Glue scripts deployed!"

      - name: 📋 Verify upload
        run: |
          BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}"
          echo "📋 Files in S3:"
          aws s3 ls s3://$BUCKET_NAME/glue_scripts/ --recursive

  deploy-lambda:
    name: 📦 Deploy Lambda Function
    runs-on: ubuntu-latest
    needs: deploy-glue

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Package Lambda
        working-directory: lambda
        run: |
          zip -r lambda_function.zip .

      - name: 📤 Update Lambda Function
        run: |
          FUNCTION_NAME="${{ secrets.LAMBDA_FUNCTION_NAME }}"
          
          aws lambda update-function-code \
            --function-name $FUNCTION_NAME \
            --zip-file fileb://lambda/lambda_function.zip
          
          echo "✅ Lambda function updated!"

  summary:
    name: ✅ Deployment Summary
    runs-on: ubuntu-latest
    needs: [deploy-glue, deploy-lambda]
    if: always()

    steps:
      - name: 📊 Show results
        run: |
          echo "======================================"
          echo "🎯 DEPLOYMENT COMPLETE"
          echo "======================================"
          echo "Glue Scripts: ${{ needs.deploy-glue.result }}"
          echo "Lambda: ${{ needs.deploy-lambda.result }}"
          echo "======================================"
          echo "✅ All code deployed successfully!"
